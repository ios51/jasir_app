# ══════════════════════════════════════════════════════════════════
#  codemagic.yaml — بناء تطبيق جاسر لـ iOS + نشر TestFlight
#  (التوقيع بالطريقة الرسمية الموثّقة: ios_signing block)
#
#  المتطلبات (مرة واحدة في Codemagic → Team settings → codemagic.yaml settings):
#   • Integrations → Developer Portal: مفتاح App Store Connect باسم "jasir_asc"
#   • Code signing identities → iOS certificates → Generate certificate:
#       شهادة Apple Distribution (باستخدام مفتاح jasir_asc) — تُخزَّن في Codemagic
#   • Apple: App ID com.jasir.jasirApp مسجّل، والتطبيق منشأ في App Store Connect
#
#  عند البناء: ios_signing يجلب الشهادة المخزّنة ويُنشئ بروفايل App Store
#  تلقائياً للـBundle ID (لا حاجة لسكربتات keychain — Codemagic يعملها).
# ══════════════════════════════════════════════════════════════════
workflows:
  ios-jasir:
    name: جاسر iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: jasir_asc
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jasir.jasirApp
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.jasir.jasirApp"
    scripts:
      - name: تثبيت التبعيات
        script: flutter pub get

      - name: اختبارات الوحدة
        script: flutter test

      - name: توليد أيقونة التطبيق
        script: dart run flutter_launcher_icons

      - name: إعداد بروفايلات التوقيع
        script: xcode-project use-profiles

      - name: بناء IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
