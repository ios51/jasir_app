# ══════════════════════════════════════════════════════════════════
#  codemagic.yaml — بناء تطبيق جاسر لـ iOS + نشر TestFlight (توقيع صريح)
#
#  المتطلبات (مكتملة):
#   • Codemagic → Integrations → App Store Connect: مفتاح باسم "jasir_asc" (App Manager)
#   • Apple Developer → Identifiers: App ID com.jasir.jasirApp مسجّل
#   • App Store Connect → التطبيق منشأ بنفس الـBundle ID
#
#  التوقيع هنا صريح: fetch-signing-files --create يُنشئ الشهادة والبروفايل
#  تلقائياً إن لم يوجدا (أمتن من الاعتماد على التوقيع الضمني).
# ══════════════════════════════════════════════════════════════════
workflows:
  ios-jasir:
    name: جاسر iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: jasir_asc
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.jasir.jasirApp"
    scripts:
      - name: تثبيت التبعيات
        script: flutter pub get

      - name: إعداد التوقيع (إنشاء الشهادة والبروفايل تلقائياً)
        script: |
          keychain initialize
          # مفتاح خاص جديد — لازم لإنشاء شهادة التوزيع لأول مرة
          openssl genrsa -out /tmp/dist_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_key.pem \
            --create
          keychain add-certificates --certificate-key=@file:/tmp/dist_key.pem
          xcode-project use-profiles

      - name: بناء IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
