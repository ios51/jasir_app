# ══════════════════════════════════════════════════════════════════
#  codemagic.yaml — بناء تطبيق جاسر لـ iOS سحابياً (بدون Mac) + نشر TestFlight
#
#  المتطلبات لمرة واحدة في Codemagic:
#   1. Team → Integrations → App Store Connect: أضف مفتاح API
#      (Issuer ID + Key ID + ملف .p8)، وسمِّه — ثم ضع نفس الاسم في
#      integrations.app_store_connect أدناه (الافتراضي هنا: "jasir_asc").
#   2. في App Store Connect: أنشئ التطبيق بنفس Bundle ID: com.jasir.jasirApp
#   3. (اختياري) ضع Apple ID الرقمي للتطبيق في APP_STORE_APPLE_ID.
#
#  التطبيق يتصل بـ https://jasir-app.com (HTTPS) — لا حاجة لاستثناء ATS.
# ══════════════════════════════════════════════════════════════════
workflows:
  ios-jasir:
    name: جاسر iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: jasir_asc   # ← اسم مفتاح App Store Connect في Codemagic
    environment:
      ios_signing:
        distribution_type: app_store            # توقيع للنشر على App Store/TestFlight
        bundle_identifier: com.jasir.jasirApp   # يطابق مشروع Xcode
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.jasir.jasirApp"
        APP_STORE_APPLE_ID: 0000000000          # (اختياري) Apple ID الرقمي للتطبيق
    scripts:
      - name: تثبيت التبعيات
        script: flutter pub get

      - name: إعداد بروفايلات التوقيع
        script: xcode-project use-profiles

      - name: بناء IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
