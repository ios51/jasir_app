name: jasir_app
description: تطبيق جاسر — المساعد الشخصي الذكي (موديول المواعيد والتذكيرات والمهام)
publish_to: 'none'
version: 0.1.4+16

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.20.2
  provider: ^6.1.1
  record: ^5.1.2
  file_picker: ^8.1.2
  image_picker: ^1.0.7
  open_filex: ^4.3.4
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  record_linux: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/jasir_icon.png

# أيقونة التطبيق تُولَّد وقت البناء من الصورة المصدر (Codemagic يملك الملف كاملاً)
flutter_launcher_icons:
  ios: true
  image_path: "assets/icon/jasir_icon.png"
  remove_alpha_ios: true
